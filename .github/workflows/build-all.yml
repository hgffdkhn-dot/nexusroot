name: Build NexusRoot (APK + Daemon)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK
        run: gradle assembleDebug

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cargo-ndk and protoc
        run: |
          cargo install cargo-ndk
          sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build daemon
        working-directory: ./daemon
        run: |
          cargo ndk \
            -t ${{ matrix.target }} \
            -o ../dist/daemon \
            build --release

      - name: Collect artifacts
        run: |
          mkdir -p dist/final/${{ matrix.target }}
          cp app/build/outputs/apk/debug/app-debug.apk dist/final/${{ matrix.target }}/
          cp -r dist/daemon/${{ matrix.target }}/* dist/final/${{ matrix.target }}/ 2>/dev/null || true
          cp tools/detect_device.sh dist/final/${{ matrix.target }}/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexusroot-${{ matrix.target }}
          path: dist/final/${{ matrix.target }}/*
