name: Build NexusRoot (APK + Daemon)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rust_target: aarch64-linux-android
            android_abi: arm64-v8a
          - rust_target: armv7-linux-androideabi
            android_abi: armeabi-v7a
          - rust_target: x86_64-linux-android
            android_abi: x86_64
          - rust_target: i686-linux-android
            android_abi: x86
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK
        run: gradle assembleDebug

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cargo-ndk and protoc
        run: |
          cargo install cargo-ndk
          sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build daemon
        working-directory: ./daemon
        run: |
          cargo ndk \
            -t ${{ matrix.rust_target }} \
            -o ../dist/daemon/${{ matrix.android_abi }} \
            build --release

      - name: Collect artifacts
        run: |
          mkdir -p dist/final/${{ matrix.android_abi }}
          cp app/build/outputs/apk/debug/app-debug.apk dist/final/${{ matrix.android_abi }}/
          cp -r dist/daemon/${{ matrix.android_abi }}/* dist/final/${{ matrix.android_abi }}/ 2>/dev/null || true
          cp tools/detect_device.sh dist/final/${{ matrix.android_abi }}/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexusroot-${{ matrix.android_abi }}
          path: dist/final/${{ matrix.android_abi }}/*
