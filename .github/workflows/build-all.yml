name: Build NexusRoot (APK + Daemon)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK
        run: gradle assembleDebug

      - name: Install Rust targets
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build Rust daemon
        working-directory: ./daemon
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Collect artifacts
        run: |
          mkdir -p dist/${{ matrix.target }}
          cp app/build/outputs/apk/debug/app-debug.apk dist/${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/nexusrootd dist/${{ matrix.target }}/ 2>/dev/null || true
          cp tools/detect_device.sh dist/${{ matrix.target }}/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexusroot-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*
